<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Prosperity - Calculadora</title>
    <link rel="stylesheet" href="./public/style.css">
</head>

<body class="main-fundo">
   <header class="header">
            <section>
                <a href="#" class="logo">
                    <img src="./public/images/estrela.png" alt="logo">
                    <h1 style="color: #FFF8B5;">Stardew <br><span style="color: white;">Prosperity</span></h1>
                </a>

                <nav class="navbar">
                    <a href="index.html"><img src="./public/images/inicio.png" alt="casa" width="20px">Inicio</a>
                    <a href="calculadora.html"><img src="./public/images/moeda.png" alt="dinheiro"
                            width="20px">Calculadora</a>
                    <a href="minas.html"><img src="./public/images/picareta.png" alt="picareta" width="20px"> Minas</a>
                    <a href="entrar.html"><img src="./public/images/estrela(entrar).png" alt="login"
                            width="20px">Entrar</a>
                    <a href="cadastro.html"><img src="./public/images/The_Player_Icon.png" alt="folha"
                            width="20px">Cadastro</a>
                </nav>
            </section>
        </header>

    <main class="container-principal">
        <div class="card-calculadora">
            <h2 class="titulo-amarelo">Simulador de Colheita</h2>

            <div class="input-group">
                <label>Semente:</label>
                <input type="text" id="ipt_semente" placeholder="Ex: Morango">

                <label>Quantidade:</label>
                <input type="number" id="ipt_qtd" placeholder="Qtd de parcelas">

                <label>Preço de Compra (g):</label>
                <input type="number" id="ipt_custo" placeholder="Custo por semente">

                <label>Preço de Venda (g):</label>
                <input type="number" id="ipt_venda" placeholder="Venda por fruto">
            </div>

            <button class="btn-principal" onclick="calcularLucro()">Simular Lucro</button>

            <div id="div_resultado" class="resultado-box"></div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
<script>
    function calcularLucro() {
        // Pegando os valores dos inputs
        let nome = ipt_semente.value;
        let qtd = Number(ipt_qtd.value);
        let custo = Number(ipt_custo.value);
        let venda = Number(ipt_venda.value);

        // Validação básica
        if (nome.trim() == "" || qtd <= 0) {
            alert("Por favor, insira o nome da semente e a quantidade!");
            return;
        }

        // Cálculos solicitados
        let valorRecebido = qtd * venda;
        let custoTotal = qtd * custo;
        let lucroTotal = valorRecebido - custoTotal;

        // Definindo a cor do lucro (verde para positivo, vermelho para prejuízo)
        let corLucro = lucroTotal >= 0 ? "#90EE90" : "#FF6347";

        // Exibindo apenas o Recebido e o Lucro
        div_resultado.innerHTML = `
                <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px;">
                    <p style="margin: 5px 0;">Valor Total Recebido: <b style="color: white;">${valorRecebido}g</b></p>
                    <p style="margin: 5px 0;">Lucro Líquido: <b style="color: ${corLucro}">${lucroTotal}g</b></p>
                </div>
            `;
    }
</script>
