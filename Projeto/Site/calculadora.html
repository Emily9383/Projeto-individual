<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="./src/style.css">
    <script src="src/script.js"></script>
</head>

<body class="main-fundo">
    <section class="main-fundo">
        <header class="header">
            <section>
                <a href="#" class="logo">
                    <img src="./public/images/estrela.png" alt="logo">
                    <h1 style="color: #FFF8B5;">Stardew <br><span style="color: white;">Prosperity</span></h1>
                </a>

                <nav class="navbar">
                    <a href="index.html"><img src="./public/images/inicio.png" alt="casa" width="20px">Inicio</a>
                    <a href="calculadora.html"><img src="./public/images/moeda.png" alt="dinheiro"
                            width="20px">Calculadora</a>
                    <a href="minas.html"><img src="./public/images/picareta.png" alt="picareta" width="20px"> Minas</a>
                    <a href="entrar.html"><img src="./public/images/estrela(entrar).png" alt="login" width="20px">Entrar</a>
                    <a href="cadastro.html"><img src="./public/images/The_Player_Icon.png" alt="folha" width="20px">Cadastro</a>
                </nav>
            </section>
        </header>
    </section>

    <section class="itens">
        <img src="./public/images/img-cal.png" alt="calculadora">
        <p style="color: white;">Descubra as culturas mais lucrativas e maximize seus ganhos por estação</p>
        <div class="mudar-cal">
            <img src="./public/images/primavera-desligada.png" alt="">
            <img src="./public/images/verao-desligado.png" alt="">
            <img src="./public/images/outono-desligado.png" alt="">
        </div>
    </section>

    <section class="conf">
        <img src="./public/images/configuraçao.png" alt="">
        <div class="btn-cal">
            <button class="normal" type="button"><img src="./public/images/normal-desativado.png" alt=""></button>
            <button class="prata" type="button"><img src="./public/images/prata-desativado.png" alt=""></button><br>
            <button class="ouro" type="button"><img src="./public/images/ouro-desativado.png" alt=""></button>
            <button class="iridium" type="button"><img src="./public/images/iridium-desativado.png" alt=""></button>
        </div>
        <img class="melhor" src="./public/images/melhor-cultivo.png" alt="">

        <section>
            <img class="estrela-rank" src="./public/images/estrela-cal.png" alt="">
            <img class="rank" src="./public/images/rank-cal.png" alt="">
        </section>
    </section>

    <section>
        <section class="footer">
            <br>
            <img src="./public/images/footer.png" alt="footer" width="500px">
        </section>
    </section>

    
</body>
</html>
